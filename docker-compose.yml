version: "3.9"

services:
  devhelp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devhelp-api
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  devhelp-dev:
    image: golang:1.24-alpine
    container_name: devhelp-dev
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
    command: go run ./cmd/main.go
    profiles:
      - dev
